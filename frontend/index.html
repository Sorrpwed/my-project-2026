<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>智谱 AI 对话</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="scanline" aria-hidden="true"></div>
  <canvas class="particles" id="particles" aria-hidden="true"></canvas>

  <div class="app">
    <header class="header">
      <div class="logo" aria-hidden="true">
        <span class="logo-ring"></span>
        <span class="logo-core">◈</span>
      </div>
      <h1 class="title">智谱 AI 对话</h1>
      <p class="subtitle">
        <span class="status-dot"></span>
        GLM-4-Flash · 在线
      </p>
    </header>

    <main class="chat-panel">
      <span class="hud-corner hud-tl" aria-hidden="true"></span>
      <span class="hud-corner hud-tr" aria-hidden="true"></span>
      <span class="hud-corner hud-bl" aria-hidden="true"></span>
      <span class="hud-corner hud-br" aria-hidden="true"></span>

      <div class="panel-toolbar">
        <div class="panel-meta">
          <span class="panel-label">对话记录</span>
          <span class="msg-count" id="msgCount">0 条</span>
        </div>
        <button type="button" class="btn-clear" id="btnClear" title="清空对话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          清空对话
        </button>
      </div>

      <div class="messages" id="messages" role="log" aria-live="polite"></div>

      <form class="input-bar" id="chatForm">
        <textarea
          id="userInput"
          rows="1"
          placeholder="输入你的问题…"
          autocomplete="off"
          required
        ></textarea>
        <button type="submit" class="btn-send" id="btnSend">
          <span class="btn-send-text">发送</span>
          <span class="btn-send-glow" aria-hidden="true"></span>
        </button>
      </form>
    </main>
  </div>

  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <h3 class="modal-title" id="modalTitle">清空对话</h3>
      <p class="modal-desc">确定要清空所有对话记录吗？此操作不可恢复。</p>
      <div class="modal-actions">
        <button type="button" class="btn-modal btn-cancel" id="btnCancel">取消</button>
        <button type="button" class="btn-modal btn-confirm" id="btnConfirm">确认清空</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
