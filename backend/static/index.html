<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0d0d18;
            border-left: 1px solid #1a1a3e;
            border-right: 1px solid #1a1a3e;
        }

        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #0f0f2e 0%, #1a1040 100%);
            border-bottom: 2px solid #6c3ce0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6c3ce0;
            box-shadow: 0 0 12px #6c3ce0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #a78bfa, #6c3ce0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #0a0a14;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a4e;
            border-radius: 2px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: #14142b;
            border: 1px solid #2a2a4e;
            border-bottom-left-radius: 4px;
        }

        .message.ai pre {
            background: #0a0a14;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid #2a2a4e;
        }

        .message.ai code {
            background: #0a0a14;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .input-area {
            padding: 16px 24px;
            background: #0d0d18;
            border-top: 1px solid #1a1a3e;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #12122a;
            border: 1px solid #2a2a4e;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #6c3ce0;
            box-shadow: 0 0 0 2px rgba(108, 60, 224, 0.2);
        }

        .input-area input::placeholder {
            color: #5a5a7a;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108, 60, 224, 0.4);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background: #14142b;
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 6px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #6c3ce0;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="dot"></div>
            <h1>AI 对话助手</h1>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message ai">
                你好，我是 AI 助手。输入任何问题，我会为你解答。
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="输入你的问题..."
                autocomplete="off"
            />
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            userInput.disabled = true;

            showTyping();

            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                hideTyping();

                if (!resp.ok) {
                    const err = await resp.json();
                    addMessage('错误: ' + (err.error || '未知错误'), 'ai');
                } else {
                    const data = await resp.json();
                    addMessage(data.reply, 'ai');
                }
            } catch (e) {
                hideTyping();
                addMessage('网络错误，请检查服务器是否运行', 'ai');
            }

            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
